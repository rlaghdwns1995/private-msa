apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: order-backend-ingress
  namespace: soldesk
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: my-issuer
spec:
  tls:
  - hosts:
    - "server.g87m2.academy"
    secretName: server-g87m2-academy-tls
  rules:
  - host: server.g87m2.academy
    http:
      paths:
      - path: /member-service
        pathType: Prefix
        backend:
          service:
            name: apigateway-service
            port:
              number: 80
      - path: /product-service
        pathType: Prefix
        backend:
          service:
            name: apigateway-service
            port:
              number: 80
      - path: /ordering-service
        pathType: Prefix
        backend:
          service:
            name: apigateway-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
